<!DOCTYPE html>
<html>
<head>
    <title>Router Panel</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #00ff41; padding: 20px; border-radius: 5px; box-shadow: 0 0 20px #00ff4144; }
        .log-box { background: #000; border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 15px; margin: 15px 0; font-size: 14px; color: #00ff41; white-space: pre-wrap; }
        .section { border-top: 1px solid #333; margin-top: 20px; padding-top: 15px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #00ff41; color: #000; }
        .danger { border-color: #ff3e3e; color: #ff3e3e; }
        .danger:hover { background: #ff3e3e; color: #000; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 220px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ SYSTEM CONTROL ]</h1>
        
        <div class="section">
            <h3>ROUTER START/STOP</h3>
            <button onclick="api('/api/system', {action: 'start'})">START</button>
            <button class="danger" onclick="api('/api/system', {action: 'stop'})">STOP</button>
        </div>

        <div class="section">
            <h3>PORT FORWARDING</h3>
            <button onclick="api('/api/forward', {action: 'enable'})">ENABLE PORT FORWARDING (8080)</button>
            <button class="danger" onclick="api('/api/forward', {action: 'disable'})">DISABLE FORWARDING</button>
        </div>

        <div class="section">
            <h3>LIVE NETWORK TRAFFIC (ICMP/TCP)</h3>
            <div id="traffic" class="log-box">Initializing monitoring...</div>
        </div>

        <div class="section">
            <h3>FIREWALL</h3>
            <input type="text" id="targetIp" placeholder="Target IP (e.g. 192.168.10.2)">
            <button onclick="firewall('block')">BLOCK IP</button>
            <button onclick="firewall('unblock')">UNBLOCK IP</button>
        </div>
    </div>

    <script>
        function api(url, data) {
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(r => r.json()).then(d => alert(d.msg));
        }

        function firewall(action) {
            let ip = document.getElementById('targetIp').value;
            api('/api/firewall', {ip: ip, action: action});
        }

        setInterval(() => {
            fetch('/api/stats').then(r => r.json()).then(d => {
                const box = document.getElementById('traffic');
                box.innerText = d.traffic;
                box.scrollTop = box.scrollHeight;
            });
        }, 2000);
    </script>
</body>
</html>
